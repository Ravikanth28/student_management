name: Build Android APK

# Builds the Capacitor Android APK in the cloud (no local Android Studio needed)
# and publishes it to a fixed "apk-latest" release so the web app can link to it:
#   https://github.com/<OWNER>/<REPO>/releases/download/apk-latest/student-portal.apk
#
# Setup (one time):
#   1. Push this repo to GitHub.
#   2. Deploy the backend to a public HTTPS URL.
#   3. Repo → Settings → Secrets and variables → Actions → New repository secret:
#        Name:  VITE_API_BASE_URL
#        Value: https://your-deployed-backend.example.com
#   4. Run this workflow (Actions tab → Build Android APK → Run workflow),
#      or push a tag like v1.0.0.

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm ci

      - name: Build web app (pointed at the deployed backend)
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
        run: npm run build

      - name: Add Android platform
        run: npx --no-install cap add android

      - name: Wire up Firebase (google-services) for push notifications
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          # Source the client config from a GitHub secret (base64) if set,
          # otherwise fall back to a committed google-services.json.
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" | base64 -d > google-services.json
            echo "Using google-services.json from GitHub secret."
          fi
          if [ -f google-services.json ]; then
            cp google-services.json android/app/google-services.json
            # Add the google-services classpath to the project-level build.gradle.
            PROJ=android/build.gradle
            grep -q "com.google.gms:google-services" "$PROJ" || \
              sed -i 's#\(classpath .com.android.tools.build:gradle.*\)#\1\n        classpath "com.google.gms:google-services:4.4.2"#' "$PROJ"
            # Apply the plugin in the app-level build.gradle.
            APP=android/app/build.gradle
            grep -q "com.google.gms.google-services" "$APP" || \
              echo "apply plugin: 'com.google.gms.google-services'" >> "$APP"
            echo "Firebase wired up."
          else
            echo "No google-services.json found — building without push notifications."
          fi

      - name: Enable camera + notification permissions (for the scanner & alerts)
        run: |
          MANIFEST=android/app/src/main/AndroidManifest.xml
          grep -q "android.permission.CAMERA" "$MANIFEST" || \
            sed -i 's#</manifest>#    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-feature android:name="android.hardware.camera" android:required="false" />\n</manifest>#' "$MANIFEST"
          grep -q "android.permission.POST_NOTIFICATIONS" "$MANIFEST" || \
            sed -i 's#</manifest>#    <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />\n</manifest>#' "$MANIFEST"

      - name: Stamp APK version from package.json
        run: |
          APP_VERSION=$(node -p "require('./package.json').version")
          sed -i "s/versionName \"[^\"]*\"/versionName \"$APP_VERSION\"/" android/app/build.gradle
          echo "APK versionName set to $APP_VERSION"

      - name: Sync web assets into Android project
        run: npx --no-install cap sync android

      - name: Build debug APK
        working-directory: frontend/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: cp android/app/build/outputs/apk/debug/app-debug.apk student-portal.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: student-portal-apk
          path: frontend/student-portal.apk

      - name: Publish APK to release (apk-latest)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: Student Portal — Android APK (latest)
          body: |
            Latest Android build of the Student Management Portal.
            Download `student-portal.apk` below and install it on your phone.
          files: frontend/student-portal.apk
