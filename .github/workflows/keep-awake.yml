name: Keep Render awake

# Pings the deployed backend every ~10 minutes so the free Render instance
# doesn't spin down (avoids the ~50s cold start). GitHub cron is best-effort
# and may run a little late. Runs only on the default branch.
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -sS -m 30 https://student-portal-7udb.onrender.com/health || true
