# Render Blueprint — single Web Service.
# The Express backend serves BOTH the API (/api/*) and the built React frontend
# (everything else), so there's one URL, one service, and no CORS between them.
# The database is TiDB Cloud (external), so no DB service is defined here.
#
# Deploy: Render Dashboard → New → Blueprint → pick this repo, then fill in the
# env vars marked "sync: false".

services:
  - type: web
    name: student-portal
    runtime: node
    plan: free
    # Build the frontend, build the backend, then drop the web build into
    # backend/dist/public so the server can serve it.
    buildCommand: >-
      cd frontend && npm install --include=dev && npm run build &&
      cd ../backend && npm install --include=dev && npm run build &&
      rm -rf dist/public && cp -r ../frontend/dist dist/public
    startCommand: cd backend && npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Strong JWT secret generated & stored by Render (never in the repo).
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 8h
      # TiDB Cloud connection string — paste in the dashboard.
      - key: TIDB_URL
        sync: false
      - key: ADMIN_USERNAME
        value: admin
      # bcrypt hash of the admin password (required in production).
      #   node -e "console.log(require('bcrypt').hashSync('YourPassword',12))"
      - key: ADMIN_PASSWORD_HASH
        sync: false
      # Web is same-origin so no CORS is needed for it; the Android app's
      # https://localhost origin is always allowed in code.
      # Cloudinary (optional — photo uploads).
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      # Google Drive photo import (optional).
      - key: GOOGLE_API_KEY
        sync: false
      # Public APK download URL (frontend build-time var; set after the APK build).
      # Left blank → the "Download App" option stays hidden.
      - key: VITE_APK_URL
        sync: false
      # NOTE: VITE_API_BASE_URL is intentionally NOT set — the web app calls /api
      # on its own origin. For the Android APK build (GitHub Actions), set the
      # VITE_API_BASE_URL secret there to this service's URL.
